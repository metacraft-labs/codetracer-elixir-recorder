name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Run tests
        run: nix develop --command bash -c 'mkdir -p logs && just test 2>&1 | tee logs/test.log'
      - name: Upload full logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Run lint
        run: nix develop --command bash -c 'mkdir -p logs && just lint 2>&1 | tee logs/lint.log'
      - name: Upload full logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs
          path: logs/

  nix-build:
    name: nix-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build default package
        run: mkdir -p logs && nix build .#default --print-build-logs 2>&1 | tee logs/nix-build.log
      - name: Upload full logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nix-build-logs
          path: logs/
